appId: dev.glebmish.limn
productName: limn
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
  - "!node_modules/electron/**"
  # engine CLIs come from the user's PATH (claude / codex installs);
  # exclude the SDKs' bundled platform binaries to keep the app small
  - "!node_modules/@anthropic-ai/claude-agent-sdk-*/**"
  - "!node_modules/@openai/codex-darwin-*/**"
  - "!node_modules/@openai/codex-linux-*/**"
  - "!node_modules/@openai/codex-win32-*/**"
asarUnpack:
  - "**/node_modules/@anthropic-ai/**"
  - "**/node_modules/@openai/**"
mac:
  target:
    - target: dir
      arch: arm64
    - target: zip
      arch: arm64
    - target: dmg
      arch: arm64
  identity: null
  category: public.app-category.developer-tools
npmRebuild: false
