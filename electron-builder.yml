appId: dev.glebmish.limn
productName: Limn
directories:
  output: dist
  buildResources: build
electronLanguages:
  - en
files:
  - out/**
  - package.json
  - "!node_modules/electron/**"
  # engine CLIs come from the user's PATH (claude / codex installs);
  # exclude Claude SDK bundled platform binaries to keep the app small
  - "!node_modules/@anthropic-ai/claude-agent-sdk-*/**"
asarUnpack:
  - "**/node_modules/@anthropic-ai/**"
mac:
  target:
    - target: dir
      arch: arm64
    - target: zip
      arch: arm64
    - target: dmg
      arch: arm64
  identity: "-"
  hardenedRuntime: false
  category: public.app-category.developer-tools
npmRebuild: false
